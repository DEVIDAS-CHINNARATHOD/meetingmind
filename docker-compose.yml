version: "3.9"

# ╔══════════════════════════════════════════════════════════════╗
# ║  MeetingMind AI — Full Stack Docker Compose                 ║
# ║  Phase 1-4: Backend + Frontend + Workers + Infrastructure   ║
# ╚══════════════════════════════════════════════════════════════╝
#
# Usage:
#   cp backend/.env.example  backend/.env    # fill GROQ_API_KEY etc.
#   cp frontend/.env.example frontend/.env.local
#   docker compose up --build
#
# Services:
#   postgres     → localhost:5432
#   redis        → localhost:6379
#   api          → localhost:8000  (FastAPI + Swagger at /api/docs)
#   frontend     → localhost:3000  (Next.js)
#   worker-ai    → Celery AI queue (transcription, summarization, face recog)
#   worker-reports → Celery reports queue (PDF/DOCX generation)
#   worker-bots  → Celery bots queue (Zoom + Meet browser bots)
#   flower       → localhost:5555  (Celery monitor, --profile debug)
#   nginx        → localhost:80/443 (--profile production)

services:

  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetingmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ── Backend API ────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/meetingmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/data/uploads
      CHROMA_DB_PATH: /app/data/chromadb
      ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 15s

  # ── Celery AI Worker ───────────────────────────────────────
  # Handles: transcription, diarization, face recognition, summarization, embedding

  worker-ai:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    command: >
      celery -A workers.celery_app worker
      --queues ai
      --concurrency 1
      --loglevel info
      --hostname ai-worker@%h
      --max-tasks-per-child 10
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/meetingmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/data/uploads
      CHROMA_DB_PATH: /app/data/chromadb
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 6G    # Whisper large-v3 ~3GB + InsightFace ~1.5GB

  # ── Celery Reports Worker ──────────────────────────────────
  # Handles: PDF/DOCX generation (light, I/O bound)

  worker-reports:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    command: >
      celery -A workers.celery_app worker
      --queues reports
      --concurrency 4
      --loglevel info
      --hostname reports-worker@%h
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/meetingmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/data/uploads
      CHROMA_DB_PATH: /app/data/chromadb
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Bot Worker ──────────────────────────────────────
  # Handles: Zoom bot, Google Meet Playwright bot (long-running)

  worker-bots:
    build:
      context: ./backend
      dockerfile: Dockerfile.bots
      target: bots
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/meetingmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/data/uploads
      CHROMA_DB_PATH: /app/data/chromadb
      DISPLAY: ":99"
    volumes:
      - app_data:/app/data
    shm_size: "2gb"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ── NGINX (production profile) ─────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    profiles:
      - production

  # ── Flower (debug profile) ─────────────────────────────────

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    command: >
      celery -A workers.celery_app flower
      --port=5555
      --basic_auth=admin:meetingmind
      --url_prefix=flower
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      - redis
    profiles:
      - debug

volumes:
  postgres_data:
  redis_data:
  app_data:

networks:
  default:
    name: meetingmind-network
