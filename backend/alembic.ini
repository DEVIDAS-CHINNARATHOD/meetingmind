# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = db/migrations

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# sys.path path, relative to alembic.ini or absolute
prepend_sys_path = .

# version path separator; as above, this defaults to the system path separator.
version_path_separator = :

# the output encoding used when writing new migration files
output_encoding = utf-8

sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/meetingmind

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
