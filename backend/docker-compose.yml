version: "3.9"
# MeetingMind AI — Phase 4 Production Docker Compose
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetingmind
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      retries: 10

  api:
    build: {context: ., dockerfile: Dockerfile, target: api}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/meetingmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/data/uploads
      CHROMA_DB_PATH: /app/data/chromadb
    ports: ["8000:8000"]
    volumes: [app_data:/app/data]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/api/health"]
      interval: 15s
      retries: 5

  worker-ai:
    build: {context: ., dockerfile: Dockerfile, target: worker}
    command: celery -A workers.celery_app worker --queues ai --concurrency 1 --loglevel info --hostname ai@%h
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/meetingmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/data/uploads
      CHROMA_DB_PATH: /app/data/chromadb
    volumes: [app_data:/app/data]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    deploy:
      resources:
        limits: {memory: 6G}

  worker-reports:
    build: {context: ., dockerfile: Dockerfile, target: worker}
    command: celery -A workers.celery_app worker --queues reports --concurrency 4 --loglevel info --hostname reports@%h
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/meetingmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/data/uploads
      CHROMA_DB_PATH: /app/data/chromadb
    volumes: [app_data:/app/data]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  worker-bots:
    build: {context: ., dockerfile: Dockerfile.bots, target: bots}
    command: celery -A workers.celery_app worker --queues bots --concurrency 5 --loglevel info --hostname bots@%h
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/meetingmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/data/uploads
      CHROMA_DB_PATH: /app/data/chromadb
    volumes: [app_data:/app/data]
    shm_size: "2gb"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["80:80","443:443"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on: [api]
    profiles: [production]

  flower:
    build: {context: ., dockerfile: Dockerfile, target: worker}
    command: celery -A workers.celery_app flower --port=5555 --basic_auth=admin:meetingmind
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    ports: ["5555:5555"]
    depends_on: [redis]
    profiles: [debug]

volumes:
  postgres_data:
  redis_data:
  app_data:
